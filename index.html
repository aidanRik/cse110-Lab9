<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({ 
      token: "65b4c2f98f274c6495bded7e0f1ed573"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>
  
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      console.log('🌐 Global error caught!');
      console.log('Message:', message);
      console.log('Source:', source);
      console.log('Line:', lineno, '| Column:', colno);
      console.log('Error object:', error);
      return true; // prevents the browser from showing its own error
    };

    class ValidationError extends Error {
      constructor(message, field) {
        super(message);
        this.name = 'ValidationError';
        this.field = field;
      }
    }

    class DivisionByZeroError extends Error {
      constructor() {
        super('Cannot divide by zero');
        this.name = 'DivisionByZeroError';
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      try {
        if (firstNum === '' || secondNum === '') {
          throw new ValidationError('Both number fields must be filled in', 'input');
        }
        if (operator === '/' && secondNum === '0') {
          throw new DivisionByZeroError();
        }
        let result = eval(`${firstNum} ${operator} ${secondNum}`);
        if (!isFinite(result)) {
          throw new Error('Result is not a finite number');
        }
        output.value = result;
      } catch (e) {
        if (e instanceof DivisionByZeroError) {
          console.error(`[${e.name}] ${e.message}`);
          output.value = 'Cannot divide by zero';
        } else if (e instanceof ValidationError) {
          console.error(`[${e.name}] Field "${e.field}": ${e.message}`);
          output.value = 'Validation Error';
        } else {
          console.error('[UnknownError]', e.message);
          output.value = 'Error';
          throw e; // re-throw anything you didn't anticipate
        }
      } finally {
        console.log('Calculation attempt finished regardless of outcome');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    errorBtns[0].addEventListener('click', () => {
      console.log('Console Log demo:', { name: 'Lab9', step: 2, works: true });
    });

    errorBtns[1].addEventListener('click', () => {
      console.error('Console Error demo: something went wrong');
    });

    errorBtns[2].addEventListener('click', () => {
      console.count('button-clicks');
    });

    errorBtns[3].addEventListener('click', () => {
      console.warn('Console Warn demo: this is a warning');
    });

    errorBtns[4].addEventListener('click', () => {
      console.assert(1 === 2, 'Assert demo: 1 does not equal 2');
    });

    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    errorBtns[6].addEventListener('click', () => {
      console.dir(document.body);
    });

    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document.body);
    });

    errorBtns[8].addEventListener('click', () => {
      console.group('My Group');
      console.log('inside the group - item 1');
      console.log('inside the group - item 2');
    });

    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    errorBtns[10].addEventListener('click', () => {
      console.table([
        { name: 'Alice', age: 30, role: 'Engineer' },
        { name: 'Bob',   age: 25, role: 'Designer' },
        { name: 'Carol', age: 28, role: 'Manager'  }
      ]);
    });

    errorBtns[11].addEventListener('click', () => {
      console.time('myTimer');
      console.log('Timer started');
    });

    errorBtns[12].addEventListener('click', () => {
      console.timeEnd('myTimer');
    });

    errorBtns[13].addEventListener('click', () => {
      function inner() { console.trace('Trace demo'); }
      function outer() { inner(); }
      outer();
    });

    errorBtns[14].addEventListener('click', () => {
      setTimeout(() => {
        undefinedFunction(); 
      }, 0);
    });
  </script>
</body>

</html>
